name: Resync All Releases from Upstream (Oldest First)

on:
  workflow_dispatch:   # 仅允许手动触发
    inputs:
      delete_existing_releases:
        description: '删除 fork 中现有的所有 Releases？(true / false)'
        required: true
        default: 'false'
      delete_tags_too:
        description: '是否同时删除本地和远程的标签？（仅当 delete_existing_releases 为 true 时有效）'
        required: true
        default: 'false'
      force_recreate:
        description: '如果 Release 已存在，是否强制删除并重新创建？(true / false)'
        required: true
        default: 'false'

jobs:
  resync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch all tags
        run: |
          git remote add upstream https://github.com/sld272/Ximalaya-XM-Decrypt.git
          git fetch upstream --tags

      # ---------- 清理阶段 ----------
      - name: Delete existing releases (if requested)
        if: github.event.inputs.delete_existing_releases == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "正在获取 fork 中现有的所有 Releases..."
          EXISTING_RELEASES=$(gh release list -R ${{ github.repository }} --limit 1000 --json tagName -q '.[].tagName')
          if [ -n "$EXISTING_RELEASES" ]; then
            for TAG in $EXISTING_RELEASES; do
              echo "删除 Release: $TAG"
              gh release delete "$TAG" -R ${{ github.repository }} --yes
            done
          else
            echo "fork 中没有找到任何 Release。"
          fi

      - name: Delete tags (if requested and releases were deleted)
        if: github.event.inputs.delete_existing_releases == 'true' && github.event.inputs.delete_tags_too == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "正在获取本地所有标签..."
          LOCAL_TAGS=$(git tag)
          if [ -n "$LOCAL_TAGS" ]; then
            for TAG in $LOCAL_TAGS; do
              echo "删除本地和远程标签: $TAG"
              git tag -d "$TAG"
              git push origin --delete "$TAG" || echo "远程标签 $TAG 可能不存在，忽略"
            done
          else
            echo "本地没有标签。"
          fi
          # 重新从上游获取所有标签，确保后续步骤有完整的标签列表
          git fetch upstream --tags --force

      # ---------- 推送所有标签到 fork 远程（关键修复）----------
      - name: Push all tags to fork remote
        run: |
          git push origin --tags --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 获取上游 release 列表（从老到新）----------
      - name: Get upstream releases sorted by date (oldest first)
        id: get_releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_JSON=$(gh release list -R sld272/Ximalaya-XM-Decrypt --limit 1000 --json tagName,publishedAt -q 'sort_by(., .publishedAt) | map(.tagName)')
          TAGS=$(echo "$RELEASES_JSON" | jq -r 'join(" ")')
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "找到 $(echo $TAGS | wc -w) 个上游 Release，将按以下顺序同步："
          for tag in $TAGS; do echo "  $tag"; done

      # ---------- 同步每个 release ----------
      - name: Sync each release (oldest first)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS="${{ steps.get_releases.outputs.tags }}"
          FORCE_RECREATE="${{ github.event.inputs.force_recreate }}"

          for TAG in $TAGS; do
            echo "========================================="
            echo "处理 Release: $TAG"

            # 检查 fork 中是否已存在该 Release
            if gh release view "$TAG" -R ${{ github.repository }} &>/dev/null; then
              if [ "$FORCE_RECREATE" == "true" ]; then
                echo "Release $TAG 已存在，但 force_recreate=true，将删除后重新创建。"
                gh release delete "$TAG" -R ${{ github.repository }} --yes
              else
                echo "Release $TAG 已存在，跳过创建（如需强制重新创建，请设置 force_recreate=true）。"
                # 即使跳过创建，仍然检查附件（可选），此处省略附件检查以简化，可自行添加逻辑
              fi
            fi

            # 如果 fork 中不存在该 Release（或刚被删除），则创建
            if ! gh release view "$TAG" -R ${{ github.repository }} &>/dev/null; then
              echo "在 fork 中创建 Release: $TAG"
              BODY=$(gh release view "$TAG" -R sld272/Ximalaya-XM-Decrypt --json body -q .body)
              # 现在标签已推送到远程，--verify-tag 可以成功
              gh release create "$TAG" \
                --repo ${{ github.repository }} \
                --title "$TAG" \
                --notes "$BODY" \
                --verify-tag
            fi

            # ---------- 同步附件 ----------
            ASSETS=$(gh release view "$TAG" -R sld272/Ximalaya-XM-Decrypt --json assets -q '.assets[].name')
            if [ -n "$ASSETS" ]; then
              echo "同步附件："
              for ASSET in $ASSETS; do
                echo "  处理附件: $ASSET"
                gh release download "$TAG" -R sld272/Ximalaya-XM-Decrypt -p "$ASSET" --clobber
                gh release upload "$TAG" "$ASSET" --repo ${{ github.repository }} --clobber
                rm -f "$ASSET"
              done
            else
              echo "该 Release 没有附件。"
            fi
          done
